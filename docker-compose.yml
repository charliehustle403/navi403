# Local-dev Postgres for Navi (Milestone 1). Pinned to Postgres 16 per the build spec §4.
# Bring up:  docker compose up -d
# Tear down: docker compose down        (add -v to also drop the data volume)
services:
  db:
    image: postgres:16
    container_name: navi-postgres
    environment:
      POSTGRES_USER: navi
      POSTGRES_PASSWORD: navi
      POSTGRES_DB: navi
    ports:
      - "127.0.0.1:5432:5432" # localhost only — matches the MVP's localhost-bind posture
    volumes:
      - navi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navi -d navi"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  navi_pgdata:
